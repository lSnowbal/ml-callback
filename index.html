<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ML Auto Sender — Callback</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f10;color:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:16px;padding:36px;max-width:520px;width:100%;text-align:center}
.icon{font-size:52px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin-bottom:8px}
.sub{color:#8e8e93;font-size:13px;margin-bottom:24px}
.step{background:#2c2c2e;border-radius:10px;padding:14px 16px;text-align:left;margin-bottom:10px}
.slabel{font-size:10px;font-weight:700;letter-spacing:1px;color:#8e8e93;text-transform:uppercase;margin-bottom:8px}
.url{background:#0f0f10;border:1px solid #30d158;border-radius:6px;padding:10px 12px;font-family:'Consolas',monospace;font-size:12px;color:#30d158;word-break:break-all;user-select:all}
.cbtn{margin-top:10px;background:#0a84ff;color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:700}
.cbtn:hover{background:#409cff}
.hint{color:#8e8e93;font-size:12px;margin-top:8px}
a{color:#0a84ff;text-decoration:none}
.err h2{color:#ff453a}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Verificando...</h2>
  <p class="sub" id="sub"></p>
  <div id="content"></div>
</div>
<script>
(function(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code'), error=params.get('error');
  const icon=$('icon'), title=$('title'), sub=$('sub'), content=$('content'), card=$('card');
  function $(id){return document.getElementById(id);}

  if(error||!code){
    icon.textContent='❌'; title.textContent='Autorização negada'; title.style.color='#ff453a';
    sub.textContent='Feche esta aba e tente novamente.';
    return;
  }

  icon.textContent='✅'; title.textContent='Autorização concluída!'; title.style.color='#30d158';
  sub.textContent='Copie a URL desta página e cole na tela de autorização.';

  const fullUrl=location.href;
  try{navigator.clipboard.writeText(fullUrl);}catch{}

  content.innerHTML=`
    <div class="step">
      <div class="slabel">Passo 1 — Copie esta URL</div>
      <div class="url" id="furl">${fullUrl}</div>
      <button class="cbtn" onclick="cp()">📋 Copiar URL</button>
    </div>
    <div class="step">
      <div class="slabel">Passo 2</div>
      <p style="font-size:13px;color:#8e8e93">Volte para <a href="trocar.html">trocar.html</a>, cole a URL no campo e clique em <strong style="color:#f5f5f7">Trocar Código por Token</strong>.</p>
    </div>`;

  function cp(){
    navigator.clipboard.writeText(fullUrl).then(()=>{
      const b=document.querySelector('.cbtn'); b.textContent='✔ Copiado!'; b.style.background='#30d158';
      setTimeout(()=>{b.textContent='📋 Copiar URL';b.style.background='#0a84ff';},2000);
    });
  }
  window.cp=cp;
})();
</script>
</body>
</html>
