<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Auto Sender — Autorização</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0f0f10;color:#f5f5f7;min-height:100vh;
     display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:16px;
      padding:36px;max-width:600px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.5)}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:#8e8e93;font-size:13px;margin-bottom:28px}
.step{background:#2c2c2e;border-radius:10px;padding:16px 18px;margin-bottom:12px}
.step-label{font-size:10px;font-weight:700;letter-spacing:1px;color:#8e8e93;
            text-transform:uppercase;margin-bottom:10px}
label{display:block;font-size:11px;font-weight:600;color:#8e8e93;
      text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:12px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;background:#0f0f10;border:1px solid #48484a;border-radius:8px;
               color:#f5f5f7;font-size:13px;padding:10px 13px;
               font-family:'Consolas',monospace;transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:#0a84ff}
input[type=password]{letter-spacing:2px}
textarea{height:64px;resize:vertical}
.btn{display:block;width:100%;padding:13px;border-radius:10px;border:none;
     font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:.15s}
.btn-auth{background:#0a84ff;color:#fff;margin-bottom:10px}
.btn-auth:hover{background:#409cff}
.btn-exchange{background:#30d158;color:#fff}
.btn-exchange:hover{background:#4cd964}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result{border-radius:10px;padding:16px 18px;margin-top:16px;display:none}
.result.ok{background:#1a3a1a;border:1px solid #30d158}
.result.err{background:#3a1a1a;border:1px solid #ff453a}
.result-title{font-weight:700;font-size:13px;margin-bottom:8px}
.json-box{background:#0f0f10;border-radius:6px;padding:12px;
          font-family:'Consolas',monospace;font-size:11px;color:#30d158;
          white-space:pre;word-break:break-all;margin:8px 0;max-height:160px;overflow-y:auto}
.copy-btn{background:#0a84ff;color:#fff;border:none;border-radius:6px;
          padding:8px 18px;cursor:pointer;font-size:12px;font-weight:700;margin-top:4px}
.copy-btn:hover{background:#409cff}
.hint{color:#8e8e93;font-size:11px;margin-top:8px;line-height:1.5}
.sep{border:none;border-top:1px solid #3a3a3c;margin:20px 0}
.tag{display:inline-block;background:#0a84ff22;color:#0a84ff;
     border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:6px}
.warn{color:#ff9f0a;font-size:12px;margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <h1>⚡ ML Auto Sender <span class="tag">Autorização</span></h1>
  <p class="sub">Configure uma vez e o token renova automaticamente.</p>

  <!-- Passo 1 -->
  <div class="step">
    <div class="step-label">Passo 1 — Worker</div>
    <label>URL do Cloudflare Worker</label>
    <input type="text" id="worker" placeholder="https://crimson-heart-bac6.michaelvmardegam.workers.dev">
    <label>Chave secreta do Worker</label>
    <input type="password" id="secret" placeholder="Sua chave secreta">
  </div>

  <!-- Passo 2 -->
  <div class="step">
    <div class="step-label">Passo 2 — App Mercado Livre</div>
    <label>App ID (Client ID)</label>
    <input type="text" id="cid" placeholder="Ex: 8667328126564277">
    <label>Client Secret</label>
    <input type="password" id="cs" placeholder="Chave secreta do App">
    <label>Redirect URI</label>
    <input type="text" id="ru" value="">
  </div>

  <hr class="sep">

  <!-- Passo 3 -->
  <div class="step">
    <div class="step-label">Passo 3 — Autorizar</div>
    <button class="btn btn-auth" onclick="openAuth()">🔑 Abrir Autorização no Mercado Livre</button>
    <label>URL completa após autorizar</label>
    <textarea id="cburl" placeholder="https://lsnowbal.github.io/ml-callback/?code=TG-..."></textarea>
    <p class="warn">⚠ O código expira em ~5 minutos. Clique em Trocar logo após colar.</p>
  </div>

  <button class="btn btn-exchange" id="btnEx" onclick="exchange()">🔄 Trocar Código por Token</button>

  <div class="result" id="result">
    <div class="result-title" id="rtitle"></div>
    <div id="rbody"></div>
  </div>
</div>

<script>
// Auto-fill redirect URI from this page's base URL
window.addEventListener('load', () => {
  const base = window.location.origin + window.location.pathname.replace('/trocar.html','');
  document.getElementById('ru').value = base;
  // Restore saved values
  ['worker','secret','cid','cs','ru'].forEach(id => {
    const v = localStorage.getItem('mlas_' + id);
    if (v) document.getElementById(id).value = v;
  });
});

function save() {
  ['worker','secret','cid','cs','ru'].forEach(id => {
    localStorage.setItem('mlas_' + id, document.getElementById(id).value.trim());
  });
}

function v(id) { return document.getElementById(id).value.trim(); }

function openAuth() {
  save();
  const cid = v('cid'), ru = v('ru');
  if (!cid || !ru) { alert('Preencha o App ID e a Redirect URI.'); return; }
  const url = 'https://auth.mercadolivre.com.br/authorization?' +
    new URLSearchParams({ response_type: 'code', client_id: cid, redirect_uri: ru });
  window.open(url, '_blank');
}

function extractCode(url) {
  try { return new URL(url).searchParams.get('code'); }
  catch { const m = url.match(/[?&]code=([^&]+)/); return m ? m[1] : null; }
}

async function exchange() {
  save();
  const worker = v('worker'), secret = v('secret');
  const cid    = v('cid'),    cs     = v('cs');
  const ru     = v('ru'),     cburl  = v('cburl');
  const res    = document.getElementById('result');
  const rt     = document.getElementById('rtitle');
  const rb     = document.getElementById('rbody');
  const btn    = document.getElementById('btnEx');

  if (!worker)          { alert('Informe a URL do Worker.'); return; }
  if (!cid || !cs || !ru) { alert('Preencha as credenciais do App ML.'); return; }
  if (!cburl)           { alert('Cole a URL do GitHub após autorizar.'); return; }

  const code = extractCode(cburl);
  if (!code) { alert('Código não encontrado na URL. Cole a URL completa.'); return; }

  btn.disabled = true;
  res.style.display = 'block';
  res.className = 'result';
  rt.style.color = '#ff9f0a';
  rt.textContent = '⏳ Conectando ao Mercado Livre via Worker...';
  rb.innerHTML = '';

  const body = new URLSearchParams({
    grant_type: 'authorization_code', client_id: cid,
    client_secret: cs, code, redirect_uri: ru,
  });

  let data = null, errMsg = '';

  // Try via Worker /api/oauth (preferred — avoids CORS)
  try {
    const r = await fetch(worker.replace(/\/$/, '') + '/api/oauth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Secret': secret },
      body: body.toString(),
    });
    data = await r.json();
  } catch(e) { errMsg = e.message; }

  // Fallback: direct ML call (works when CORS not blocked)
  if (!data?.access_token) {
    rt.textContent = '⏳ Tentativa 2 — chamada direta ao ML...';
    try {
      const r2 = await fetch('https://api.mercadolibre.com/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      });
      data = await r2.json();
    } catch(e2) { errMsg += ' | ' + e2.message; }
  }

  btn.disabled = false;

  if (!data?.access_token) {
    res.className = 'result err';
    rt.style.color = '#ff453a';
    rt.textContent = '❌ Erro:';
    const msg = data?.message || data?.error_description || errMsg || JSON.stringify(data);
    rb.innerHTML = `<div style="color:#ff453a;font-size:12px;margin-bottom:8px">${msg}</div>
      ${msg.includes('invalid_grant') ? '<p class="hint">O código expirou — clique em <strong>Abrir Autorização</strong> novamente e troque o código em menos de 5 minutos.</p>' : ''}`;
    return;
  }

  // Get seller_id
  let sellerId = '';
  try {
    const me = await fetch('https://api.mercadolibre.com/users/me',
      { headers: { Authorization: 'Bearer ' + data.access_token } });
    sellerId = String((await me.json()).id || '');
  } catch {}

  // Save to Worker KV via /api/setup
  let savedToWorker = false;
  if (worker && secret) {
    try {
      const sr = await fetch(worker.replace(/\/$/, '') + '/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Secret': secret },
        body: JSON.stringify({
          access_token:  data.access_token,
          refresh_token: data.refresh_token || '',
          seller_id:     sellerId,
        }),
      });
      savedToWorker = sr.ok;
    } catch {}
  }

  const tokenJson = JSON.stringify({
    access_token:  data.access_token,
    refresh_token: data.refresh_token || '',
    seller_id:     sellerId,
  }, null, 2);

  localStorage.setItem('mlas_token', tokenJson);

  res.className = 'result ok';
  rt.style.color = '#30d158';
  rt.textContent = `✅ Token obtido! Seller ID: ${sellerId}${savedToWorker ? ' · Salvo no Worker ✔' : ''}`;
  rb.innerHTML = `
    ${savedToWorker
      ? `<p class="hint" style="color:#30d158">✔ Token salvo automaticamente no Worker. Abra o ML Auto Sender e clique em Enviar Credenciais.</p>`
      : `<p class="hint">Copie o JSON abaixo e salve no ML Auto Sender → Configurações → Enviar Credenciais ao Worker.</p>`
    }
    <div class="json-box" id="tjson">${tokenJson}</div>
    <button class="copy-btn" onclick="copyJSON()">📋 Copiar JSON</button>
    <p class="hint" style="margin-top:10px">
      Depois de copiar, abra o <strong>ML Auto Sender</strong>, preencha os campos de 
      Access Token e Seller ID e clique em <strong>Enviar Credenciais ao Worker</strong>.
    </p>`;
}

function copyJSON() {
  const text = document.getElementById('tjson').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = '✔ Copiado!'; b.style.background = '#30d158';
    setTimeout(() => { b.textContent = '📋 Copiar JSON'; b.style.background = '#0a84ff'; }, 2000);
  });
}
</script>
</body>
</html>
