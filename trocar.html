<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ML Auto Sender — Autorização</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f10;color:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:16px;padding:32px;max-width:540px;width:100%}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
.sub{color:#8e8e93;font-size:12px;margin-bottom:24px}
.step{background:#2c2c2e;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.slabel{font-size:10px;font-weight:700;letter-spacing:1px;color:#8e8e93;text-transform:uppercase;margin-bottom:10px}
label{display:block;font-size:11px;font-weight:600;color:#8e8e93;letter-spacing:.6px;margin-bottom:5px;margin-top:10px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;background:#0f0f10;border:1px solid #48484a;border-radius:8px;color:#f5f5f7;font-size:13px;padding:9px 12px;font-family:'Consolas',monospace;transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:#0a84ff}
textarea{height:58px;resize:vertical}
.sep{border:none;border-top:1px solid #3a3a3c;margin:18px 0}
.btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:.15s}
.blue{background:#0a84ff;color:#fff}.blue:hover{background:#409cff}
.green{background:#30d158;color:#fff}.green:hover{background:#4cd964}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result{border-radius:10px;padding:14px 16px;margin-top:14px;display:none}
.ok{background:#1a3a1a;border:1px solid #30d158}
.err{background:#3a1a1a;border:1px solid #ff453a}
.rtitle{font-weight:700;font-size:13px;margin-bottom:6px}
.jbox{background:#0f0f10;border-radius:6px;padding:10px;font-family:'Consolas',monospace;font-size:11px;color:#30d158;white-space:pre;word-break:break-all;margin:8px 0;max-height:130px;overflow-y:auto}
.cbtn{background:#0a84ff;color:#fff;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:700}
.cbtn:hover{background:#409cff}
.hint{color:#8e8e93;font-size:11px;margin-top:8px;line-height:1.5}
.warn{color:#ff9f0a;font-size:11px;margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <h1>⚡ ML Auto Sender</h1>
  <p class="sub">Autorização OAuth · Configure uma vez, renova automaticamente</p>

  <div class="step">
    <div class="slabel">Worker</div>
    <label>URL do Cloudflare Worker</label>
    <input id="worker" placeholder="https://seu-worker.workers.dev">
    <label>Chave secreta</label>
    <input type="password" id="secret" placeholder="Sua chave secreta">
  </div>

  <div class="step">
    <div class="slabel">App Mercado Livre</div>
    <label>App ID (Client ID)</label>
    <input id="cid" placeholder="Ex: 8667328126564277">
    <label>Client Secret</label>
    <input type="password" id="cs">
    <label>Redirect URI</label>
    <input id="ru">
  </div>

  <hr class="sep">

  <button class="btn blue" onclick="auth()">🔑 Abrir Autorização no Mercado Livre</button>

  <div class="step" style="margin-top:10px">
    <div class="slabel">Passo final</div>
    <label>URL completa após autorizar</label>
    <textarea id="cburl" placeholder="https://...github.io/ml-callback/?code=TG-..."></textarea>
    <p class="warn">⚠ O código expira em ~5 minutos. Clique logo após colar.</p>
  </div>

  <button class="btn green" id="btnEx" onclick="exchange()">🔄 Trocar Código por Token</button>

  <div class="result" id="result">
    <div class="rtitle" id="rtitle"></div>
    <div id="rbody"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

window.addEventListener('load', () => {
  $('ru').value = location.origin + location.pathname.replace('/trocar.html','');
  ['worker','secret','cid','cs','ru'].forEach(id => {
    const v = localStorage.getItem('mlas_'+id); if(v) $(id).value = v;
  });
});

function save(){ ['worker','secret','cid','cs','ru'].forEach(id => localStorage.setItem('mlas_'+id, $(id).value.trim())); }
function v(id){ return $(id).value.trim(); }

function auth(){
  save();
  const cid=v('cid'), ru=v('ru');
  if(!cid||!ru){ alert('Preencha App ID e Redirect URI.'); return; }
  window.open('https://auth.mercadolivre.com.br/authorization?'+
    new URLSearchParams({response_type:'code',client_id:cid,redirect_uri:ru,scope:'offline_access read write'}),'_blank');
}

function code(url){ try{return new URL(url).searchParams.get('code');}catch{const m=url.match(/[?&]code=([^&]+)/);return m?m[1]:null;} }

async function exchange(){
  save();
  const worker=v('worker'), secret=v('secret'), cid=v('cid'), cs=v('cs'), ru=v('ru'), cburl=v('cburl');
  const res=$('result'), rt=$('rtitle'), rb=$('rbody'), btn=$('btnEx');
  if(!worker){ alert('Informe a URL do Worker.'); return; }
  if(!cid||!cs) { alert('Preencha as credenciais do App ML.'); return; }
  const c=code(cburl); if(!c){ alert('Código não encontrado na URL.'); return; }

  btn.disabled=true; res.style.display='block'; res.className='result';
  rt.style.color='#ff9f0a'; rt.textContent='⏳ Conectando...'; rb.innerHTML='';

  const body=new URLSearchParams({grant_type:'authorization_code',client_id:cid,client_secret:cs,code:c,redirect_uri:ru});
  let data=null, errMsg='';

  // Try via Worker (avoids CORS issues)
  try{
    const r=await fetch(worker.replace(/\/$/,'')+'/api/oauth',
      {method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded','X-Secret':secret},body:body.toString()});
    data=await r.json();
  }catch(e){errMsg=e.message;}

  // Fallback: direct ML call
  if(!data?.access_token){
    rt.textContent='⏳ Tentativa 2 — direto ao ML...';
    try{const r=await fetch('https://api.mercadolibre.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});data=await r.json();}
    catch(e){errMsg+=' | '+e.message;}
  }

  btn.disabled=false;

  if(!data?.access_token){
    res.className='result err'; rt.style.color='#ff453a'; rt.textContent='❌ Erro';
    const msg=data?.message||data?.error_description||errMsg||JSON.stringify(data);
    rb.innerHTML=`<div style="color:#ff453a;font-size:12px">${msg}</div>`+
      (msg.includes('invalid_grant')?'<p class="hint">Código expirado — clique em Abrir Autorização novamente e troque em menos de 5 min.</p>':'');
    return;
  }

  // Get seller_id
  let sellerId='';
  try{const me=await fetch('https://api.mercadolibre.com/users/me',{headers:{Authorization:'Bearer '+data.access_token}});sellerId=String((await me.json()).id||'');}catch{}

  // Save to Worker automatically
  let saved=false;
  if(worker&&secret){
    try{
      const sr=await fetch(worker.replace(/\/$/,'')+'/api/setup',
        {method:'POST',headers:{'Content-Type':'application/json','X-Secret':secret},
         body:JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token||'',seller_id:sellerId})});
      saved=sr.ok;
    }catch{}
  }

  const tj=JSON.stringify({access_token:data.access_token,refresh_token:data.refresh_token||'',seller_id:sellerId},null,2);
  localStorage.setItem('mlas_token',tj);

  res.className='result ok'; rt.style.color='#30d158';
  rt.textContent=`✅ Token obtido! Seller ID: ${sellerId}${saved?' · Salvo no Worker ✔':''}`;
  rb.innerHTML=(saved
    ?`<p class="hint" style="color:#30d158">✔ Credenciais salvas no Worker. Abra o ML Auto Sender → Configurações → preencha Access Token e Seller ID → Enviar Credenciais ao Worker.</p>`
    :`<p class="hint">Copie o JSON e cole no ML Auto Sender → Configurações → Enviar Credenciais ao Worker.</p>`)
    +`<div class="jbox" id="tj">${tj}</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="cbtn" onclick="cpToken('${data.access_token}')">📋 Copiar Token</button>
      <button class="cbtn" style="background:#636366" onclick="cp()">{ } Copiar JSON</button>
    </div>`;
}

function cpToken(token){
  navigator.clipboard.writeText(token).then(()=>{
    const btns=document.querySelectorAll('.cbtn'); 
    btns[0].textContent='✔ Copiado!'; btns[0].style.background='#30d158';
    setTimeout(()=>{btns[0].textContent='📋 Copiar Token';btns[0].style.background='#0a84ff';},2000);
  });
}
function cp(){
  navigator.clipboard.writeText($('tj').textContent).then(()=>{
    const btns=document.querySelectorAll('.cbtn'); 
    btns[1].textContent='✔ Copiado!'; btns[1].style.background='#30d158';
    setTimeout(()=>{btns[1].textContent='{ } Copiar JSON';btns[1].style.background='#636366';},2000);
  });
}
</script>
</body>
</html>
